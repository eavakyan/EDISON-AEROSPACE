# ============================================
# Edison Aerospace — Nginx config snippet
# Add inside the existing `server { ... }` block for edison.aero
# (the HTTPS server that already serves /var/www/edison-aerospace).
# ============================================

# 1) API reverse proxy — forwards /api/* to the Node service on 127.0.0.1:8787.
location /api/ {
    proxy_pass         http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
}

# 2) Internal endpoint that auth_request hits to validate the cookie.
location = /_auth/investors {
    internal;
    proxy_pass         http://127.0.0.1:8787/api/investors/check;
    proxy_pass_request_body off;
    proxy_set_header   Content-Length    "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   Cookie            $http_cookie;
}

# 3) Gated investor deck — /investors/ and any sub-path requires the cookie.
#    Exception: /investors/access.html is the unauthenticated gate page.
location = /investors/access.html {
    # Public — no auth.
    try_files $uri =404;
}

location /investors/ {
    auth_request     /_auth/investors;
    error_page 401 = @investors_redirect;
    try_files $uri $uri/ $uri/index.html =404;
}

location @investors_redirect {
    return 302 /investors/access.html;
}
